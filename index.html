<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thabo Search Engine</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    transition: 0.3s;
}

/* Light mode */
.light {
    background: #f5f5f5;
    color: black;
}

/* Dark mode */
.dark {
    background: #1e1e1e;
    color: white;
}

h1 {
    margin-top: 50px;
}

.container {
    margin-top: 30px;
}

input {
    width: 60%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 18px;
    outline: none;
}

button {
    padding: 15px 20px;
    border-radius: 30px;
    border: none;
    margin: 10px;
    cursor: pointer;
    font-size: 16px;
}

.search-btn {
    background: orange;
    color: white;
}

.toggle-btn {
    background: #555;
    color: white;
}

iframe {
    margin-top: 30px;
    width: 90%;
    height: 500px;
    border-radius: 15px;
    border: none;
    background: white;
}

.loading {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body class="light">

<h1>🔍 Thabo Search</h1>

<div class="container">
    <input type="text" id="searchInput" placeholder="Search anything..." onkeydown="handleKey(event)">
    <br>
    <button class="search-btn" onclick="search()">Search</button>
    <button class="toggle-btn" onclick="toggleMode()">🌙 Toggle Mode</button>
</div>

<div class="loading" id="loading"></div>

<iframe id="resultsFrame"></iframe>

<script>
function search() {
    let query = document.getElementById("searchInput").value;

    if (!query) return;

    document.getElementById("loading").innerText = "Loading results... ⏳";

    let url = "https://www.bing.com/search?q=" + encodeURIComponent(query);

    document.getElementById("resultsFrame").src = url;

    setTimeout(() => {
        document.getElementById("loading").innerText = "";
    }, 2000);
}

function handleKey(event) {
    if (event.key === "Enter") {
        search();
    }
}

function toggleMode() {
    let body = document.body;

    if (body.classList.contains("light")) {
        body.classList.remove("light");
        body.classList.add("dark");
    } else {
        body.classList.remove("dark");
        body.classList.add("light");
    }
}
</script>

</body>
</html>
